name: Daily Workout Notification

on:
  schedule:
    # 11:00 UTC = 7:00 AM EDT (6:00 AM EST). Edit this line to change the time.
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-save --no-audit --no-fund web-push@3
      - run: node scripts/send-push.mjs
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
